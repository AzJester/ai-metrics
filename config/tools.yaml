# Tool registry. Seats and costs drive the activation-rate and ROI KPIs, so
# edit these to match your actual contracts before presenting numbers.
#
# data_quality is surfaced on the dashboard so viewers always know how a
# number was measured:
#   api    = pulled automatically from a vendor API
#   export = manual CSV export from an admin console
#   vendor = CSV supplied by the vendor on request
#   survey = self-reported only (no telemetry exists)
defaults:
  # Blended fully burdened hourly rate ($/hr) used to value hours saved.
  # Get the real figure from Finance.
  burdened_rate: 85

tools:
  chatgpt:
    display_name: ChatGPT Enterprise
    vendor: OpenAI
    # $38.31/seat/mo pre-tax per invoice FBOHSDBE 0003 (May 2026 true-up:
    # $46,204.67 / 201 seats / 6 mo); 41.76 includes 9% AL sales tax.
    # Separate OpenAI API consumption invoices (~$15-55/mo) are negligible
    # and not modeled.
    monthly_cost_per_seat: 41.76
    monthly_flat_cost: 0
    # "Seats purchased" per admin console and invoice; trued up 150 -> 201
    # on 2026-05-04 (earlier months' activation is vs 201, slightly
    # understated for the 150-seat era).
    licensed_seats: 201
    data_quality: export
  claude:
    display_name: Claude Team
    vendor: Anthropic
    monthly_cost_per_seat: 30
    monthly_flat_cost: 0
    licensed_seats: 50
    data_quality: export
  claude_code:
    display_name: Claude Code
    vendor: Anthropic
    # Covered by Claude Team seats; kept separate so coding usage is not
    # double counted against chat usage.
    monthly_cost_per_seat: 0
    monthly_flat_cost: 0
    licensed_seats: 0
    data_quality: api
  copilot:
    display_name: GitHub Copilot (Free)
    vendor: GitHub
    monthly_cost_per_seat: 0
    monthly_flat_cost: 0
    licensed_seats: 40
    data_quality: survey
  rovo:
    display_name: Rovo (Atlassian)
    vendor: Atlassian
    monthly_cost_per_seat: 0
    monthly_flat_cost: 0
    licensed_seats: 200
    data_quality: export
  icertis:
    display_name: Icertis CLM
    vendor: Icertis
    monthly_cost_per_seat: 0
    monthly_flat_cost: 0
    licensed_seats: 25
    data_quality: vendor
  pwin:
    display_name: pWin.ai
    vendor: pWin.ai
    monthly_cost_per_seat: 0
    monthly_flat_cost: 0
    licensed_seats: 15
    data_quality: vendor
